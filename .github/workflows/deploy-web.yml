name: Deploy Web

# Deploys the web app to Vercel on push to main.
#
# DORMANT until you opt in: the job is skipped unless the repo variable
# ENABLE_VERCEL_DEPLOY is set to "true". To activate (Saturday):
#   1. Vercel dashboard: import this repo, set Root Directory to "web".
#   2. Add repo secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
#   3. Add repo variable ENABLE_VERCEL_DEPLOY = true.
#
# Contract deploys are intentionally NOT automated. They run manually after the
# deployer is funded from the faucet (see contracts/script/Deploy.s.sol).

on:
  push:
    branches: [main]

jobs:
  vercel:
    name: Vercel (production)
    if: ${{ vars.ENABLE_VERCEL_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm i -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
