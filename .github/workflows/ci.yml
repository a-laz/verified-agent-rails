name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for secrets
        run: bash scripts/scan-secrets.sh

  contracts:
    name: Contracts (forge)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Check formatting
        run: forge fmt --check
      - name: Build
        run: forge build --sizes
      - name: Test
        run: forge test -vvv

  typescript:
    name: TypeScript (shared, agent, web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck shared
        run: npm run typecheck -w shared
      - name: Typecheck agent
        run: npm run typecheck -w agent
      - name: Build web
        run: npm run build -w web
