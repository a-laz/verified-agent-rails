[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
# paris avoids PUSH0 and newer opcodes; safe default for Arc testnet
evm_version = "paris"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[fmt]
line_length = 120
