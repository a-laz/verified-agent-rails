[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
# cancun matches the stock Foundry defaults used in Arc's own deploy tutorial;
# OZ v5.6 requires mcopy which is Cancun-only
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
# deploy script writes the address book consumed by agent and web
fs_permissions = [{ access = "read-write", path = "../shared" }]

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

[fmt]
line_length = 120
